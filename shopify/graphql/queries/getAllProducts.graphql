query getAllProducts(
  $first: Int = null
  $last: Int = null
  $query: String = ""
  $sortKey: ProductSortKeys = RELEVANCE
  $reverse: Boolean = false
  $after: String = null
  $before: String = null
) {
  products(
    first: $first
    last: $last
    sortKey: $sortKey
    reverse: $reverse
    query: $query
    after: $after
    before: $before
  ) {
    ... on ProductConnection {
      pageInfo {
        hasNextPage
        hasPreviousPage
        endCursor
        startCursor
      }
      edges {
        cursor
        node {
          id
          title
          vendor
          handle
          __typename
          priceRange {
            minVariantPrice {
              amount
              currencyCode
            }
          }
          images(first: 1) {
            pageInfo {
              hasNextPage
              hasPreviousPage
            }
            edges {
              node {
                url
                altText
                width
                height
              }
            }
          }
        }
      }
    }
  }
}
