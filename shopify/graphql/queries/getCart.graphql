query getCart($id: ID!, $first: Int = 100) {
  cart(id: $id) {
    id
    lines(first: $first) {
      edges {
        cursor
        node {
          id
          attributes {
            key
            value
          }
          merchandise {
            ... on ProductVariant {
              id
              __typename
              image {
                url
              }
              price {
                amount
                currencyCode
              }
              product {
                title
              }
              title
              compareAtPriceV2 {
                amount
                currencyCode
              }
            }
          }
          quantity
          sellingPlanAllocation {
            sellingPlan {
              id
              name
            }
          }
          cost {
            totalAmount {
              amount
              currencyCode
            }
          }
        }
      }
    }
    totalQuantity
    cost {
      totalAmount {
        amount
        currencyCode
      }
      subtotalAmount {
        amount
        currencyCode
      }
      totalTaxAmount {
        amount
        currencyCode
      }
      totalDutyAmount {
        amount
        currencyCode
      }
    }
    checkoutUrl
    buyerIdentity {
      email
      customer {
        id
        firstName
        email
      }
    }
  }
}
