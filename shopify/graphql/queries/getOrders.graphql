query getOrders(
  $customerAccessToken: String!
  $first: Int = null
  $last: Int = null
  $after: String = null
  $before: String = null
  $reverse: Boolean = true
) {
  customer(customerAccessToken: $customerAccessToken) {
    orders(
      first: $first
      after: $after
      before: $before
      last: $last
      reverse: $reverse
    ) {
      pageInfo {
        hasNextPage
        hasPreviousPage
        endCursor
        startCursor
      }
      edges {
        node {
          id
          orderNumber
          name
          processedAt
          currencyCode
          fulfillmentStatus
          financialStatus
          statusUrl
          totalPrice {
            amount
            currencyCode
          }
          subtotalPrice {
            amount
            currencyCode
          }
          totalShippingPrice {
            amount
            currencyCode
          }
          totalTax {
            amount
            currencyCode
          }
          currentTotalPrice {
            amount
            currencyCode
          }
          shippingAddress {
            name
            address1
            address2
            formattedArea
          }
          lineItems(first: 50) {
            edges {
              node {
                title
                quantity
                discountedTotalPrice {
                  amount
                  currencyCode
                }
                variant {
                  image {
                    url
                  }
                }
              }
            }
          }
          successfulFulfillments(first: 50) {
            trackingCompany
            trackingInfo(first: 50) {
              number
              url
            }
          }
        }
      }
    }
  }
}
