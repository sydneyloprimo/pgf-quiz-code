query getOrders(
  $customerAccessToken: String!
  $first: Int = null
  $last: Int = null
  $after: String = null
  $before: String = null
  $reverse: Boolean = true
) {
  customer(customerAccessToken: $customerAccessToken) {
    orders(
      first: $first
      after: $after
      before: $before
      last: $last
      reverse: $reverse
    ) {
      pageInfo {
        hasNextPage
        hasPreviousPage
        endCursor
        startCursor
      }
      edges {
        node {
          id
          orderNumber
          totalPrice {
            amount
            currencyCode
          }
          fulfillmentStatus
          financialStatus
          name
          statusUrl
        }
      }
    }
  }
}
