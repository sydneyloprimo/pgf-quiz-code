query getLatestProducts($handle: String, $first: Int) {
  collection(handle: $handle) {
    products(first: $first) {
      ... on ProductConnection {
        __typename
        pageInfo {
          hasNextPage
          hasPreviousPage
          endCursor
          startCursor
        }
        edges {
          cursor
          node {
            id
            title
            vendor
            handle
            __typename
            priceRange {
              minVariantPrice {
                amount
                currencyCode
              }
            }
            images(first: 1) {
              pageInfo {
                hasNextPage
                hasPreviousPage
              }
              edges {
                node {
                  url: url(transform: { maxWidth: 400, crop: CENTER })
                  altText
                  width
                  height
                }
              }
            }
          }
        }
      }
    }
  }
}
